<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信公众号文章下载器</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 文章下载器</h1>
            <p class="subtitle">微信公众号文章下载工具</p>
        </div>

        <div id="status" class="status"></div>

        <div class="content">
            <!-- 单篇下载 -->
            <div class="section">
                <h2>单篇下载</h2>
                <p class="description">下载当前页面的文章</p>
                <button id="downloadCurrent" class="btn btn-primary">
                    <span class="icon">⬇️</span>
                    下载当前文章
                </button>
            </div>

            <!-- 批量下载 -->
            <div class="section">
                <h2>批量下载</h2>
                <p class="description">下载公众号历史文章</p>
                <div class="form-group">
                    <label for="batchCount">下载数量:</label>
                    <input type="number" id="batchCount" value="10" min="1" max="100">
                </div>
                <button id="downloadBatch" class="btn btn-secondary">
                    <span class="icon">📚</span>
                    开始批量下载
                </button>
            </div>

            <!-- 设置 -->
            <div class="section">
                <h2>设置</h2>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="downloadImages" checked>
                        下载图片
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="includeMetadata" checked>
                        包含元数据（作者、时间等）
                    </label>
                </div>
            </div>

            <!-- 下载历史 -->
            <div class="section">
                <h2>下载历史</h2>
                <div id="downloadHistory" class="history-list">
                    <p class="empty">暂无下载记录</p>
                </div>
                <button id="clearHistory" class="btn btn-link">清空历史</button>
            </div>
        </div>

        <div class="footer">
            <p class="version">版本 1.0.0</p>
            <p class="tip">💡 提示：在微信公众号文章页面使用此工具</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
